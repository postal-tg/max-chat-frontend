<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} | MAX Chat Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(0, 191, 166, 0.18), transparent 24%),
        linear-gradient(135deg, #f4fbfa 0%, #eff5ff 45%, #fff6ef 100%);
      min-height: 100vh;
    }
    .shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .glass {
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    pre.wrap {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .truncate {
      max-width: 480px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="shell">
    {% if request.session.get("authenticated") %}
    <nav class="navbar navbar-expand-lg glass px-4 py-3 mb-4">
      <a class="navbar-brand brand" href="/dashboard">MAX Chat Bot</a>
      <div class="navbar-nav gap-2 flex-wrap">
        <a class="nav-link" href="/dashboard">Дашборд</a>
        <a class="nav-link" href="/users">Пользователи</a>
        <a class="nav-link" href="/conversations">Диалоги</a>
        <a class="nav-link" href="/messages">Сообщения</a>
        <a class="nav-link" href="/llm-requests">LLM-вызовы</a>
        <a class="nav-link" href="/errors">Ошибки</a>
      </div>
      <div class="ms-auto">
        <a class="btn btn-outline-dark btn-sm" href="/logout">Выйти</a>
      </div>
    </nav>
    {% endif %}
    {% if backend_error %}
    <div class="alert alert-warning">{{ backend_error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
