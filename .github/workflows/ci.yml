name: Frontend CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
        working-directory: .
      - name: Ruff
        run: ruff check src
        working-directory: .
      - name: Compile
        run: python -m compileall src
        working-directory: .

